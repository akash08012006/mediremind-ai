services:
  - type: web
    name: mediremind-ai
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build && npm run build:server
    startCommand: node dist-server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_URL
        sync: false
